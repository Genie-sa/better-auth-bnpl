name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: node ${{ matrix.node }} · zod ${{ matrix.zod }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        zod: [3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install zod v4
        if: matrix.zod == 4
        run: pnpm add --save-dev zod@^4

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build
      - name: Check OpenAPI types are in sync
        if: matrix.node == 22 && matrix.zod == 3
        run: pnpm openapi:check

  better-auth-floor:
    name: better-auth 1.5.0 (peer floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pin better-auth to the peer floor
        run: pnpm add --save-dev better-auth@1.5.0

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm exec vitest run
